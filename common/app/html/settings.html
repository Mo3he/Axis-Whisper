<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whisper Subtitles - Settings</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 24px; line-height: 1.4;
    background: #f5f6f7; color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1d1f; color: #e8e8e8; }
    .card { background: #26282b !important; border-color: #3a3d40 !important; }
    input, select { background: #1c1d1f !important; color: #e8e8e8 !important; border-color: #45484c !important; }
    .hint { color: #9aa0a6 !important; }
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #6b7280; margin: 0 0 20px; font-size: 13px; }
  .card {
    max-width: 640px; background: #fff; border: 1px solid #e2e4e7;
    border-radius: 10px; padding: 20px; margin-bottom: 16px;
  }
  .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .04em;
    color: #6b7280; margin: 0 0 14px; }
  .row { display: grid; grid-template-columns: 220px 1fr; gap: 12px;
    align-items: center; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  label { font-weight: 600; font-size: 14px; }
  .hint { display: block; font-weight: 400; color: #6b7280; font-size: 12px; margin-top: 2px; }
  input, select {
    width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 14px;
    border: 1px solid #cfd3d7; border-radius: 6px; background: #fff; color: #1a1a1a;
  }
  input[type="color"] {
    width: 56px; height: 38px; padding: 2px; cursor: pointer;
  }
  .actions { max-width: 640px; display: flex; align-items: center; gap: 14px; }
  button {
    background: #1668e3; color: #fff; border: 0; border-radius: 6px;
    padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: default; }
  button.secondary { background: #6b7280; }
  #status { font-size: 14px; }
  #status.ok { color: #12805c; }
  #status.err { color: #c1121f; }
  @media (max-width: 560px) { .row { grid-template-columns: 1fr; gap: 4px; } }
</style>
</head>
<body>
  <h1>Whisper Subtitles</h1>
  <p class="sub">Tune speech detection and subtitle rendering for your environment. Changes apply live (except subtitle position, which needs an app restart).</p>

  <form id="form">
    <div class="card">
      <h2>Speech detection</h2>
      <div class="row">
        <label>Microphone sensitivity
          <span class="hint">Raise if you speak but get no subtitles; lower if noise is picked up as speech.</span>
        </label>
        <select id="MicSensitivity">
          <option value="Low">Low</option>
          <option value="Normal">Normal</option>
          <option value="High">High</option>
          <option value="Maximum">Maximum</option>
        </select>
      </div>
      <div class="row">
        <label>Silence timeout (ms)
          <span class="hint">Silence gap that ends a phrase (200-3000).</span>
        </label>
        <input type="number" id="SilenceTimeoutMs" min="200" max="3000" step="50">
      </div>
      <div class="row">
        <label>Minimum speech (ms)
          <span class="hint">Ignore bursts shorter than this (100-2000).</span>
        </label>
        <input type="number" id="MinSpeechMs" min="100" max="2000" step="50">
      </div>
      <div class="row">
        <label>Maximum phrase (s)
          <span class="hint">Longest utterance sent to whisper (2-15).</span>
        </label>
        <input type="number" id="MaxUtteranceSec" min="2" max="15" step="1">
      </div>
    </div>

    <div class="card">
      <h2>Subtitle display</h2>
      <div class="row">
        <label>Show subtitles on video
          <span class="hint">Turn off to keep transcribing (API/MQTT) without burning captions into the video.</span>
        </label>
        <select id="SubtitlesEnabled">
          <option value="yes">On</option>
          <option value="no">Off</option>
        </select>
      </div>
      <div class="row">
        <label>Live streaming captions
          <span class="hint">Build up the caption word-by-word as the person speaks (recommended for interviews) instead of showing each phrase only after a pause.</span>
        </label>
        <select id="StreamingCaptions">
          <option value="yes">On</option>
          <option value="no">Off</option>
        </select>
      </div>
      <div class="row">
        <label>On-screen duration (s)
          <span class="hint">How long a subtitle stays after the last speech (1-30).</span>
        </label>
        <input type="number" id="SubtitleDurationSec" min="1" max="30" step="1">
      </div>
      <div class="row">
        <label>Font size</label>
        <select id="FontScale">
          <option value="Small">Small</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
        </select>
      </div>
      <div class="row">
        <label>Max lines
          <span class="hint">Caption lines shown on screen (1-3).</span>
        </label>
        <input type="number" id="MaxLines" min="1" max="3" step="1">
      </div>
      <div class="row">
        <label>Bar height (%)
          <span class="hint">Subtitle bar height as a percentage of the frame (5-50).</span>
        </label>
        <input type="number" id="BarHeightPct" min="5" max="50" step="1">
      </div>
      <div class="row">
        <label>Background opacity (%)
          <span class="hint">Opacity of the box behind the text (0-100).</span>
        </label>
        <input type="number" id="BackgroundOpacity" min="0" max="100" step="5">
      </div>
      <div class="row">
        <label>Text color</label>
        <input type="color" id="TextColor">
      </div>
      <div class="row">
        <label>Position
          <span class="hint">Takes effect after an app restart.</span>
        </label>
        <select id="SubtitlePosition">
          <option value="Bottom">Bottom</option>
          <option value="Top">Top</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h2>Remote audio (optional)</h2>
      <div class="row">
        <label>Source host
          <span class="hint">Axis device to pull audio from (VAPIX). Empty = this camera's own mic.</span>
        </label>
        <input type="text" id="RemoteAudioHost" placeholder="e.g. 192.168.0.246" autocomplete="off">
      </div>
      <div class="row">
        <label>Username</label>
        <input type="text" id="RemoteAudioUser" autocomplete="off">
      </div>
      <div class="row">
        <label>Password</label>
        <input type="password" id="RemoteAudioPass" autocomplete="new-password">
      </div>
    </div>

    <div class="card">
      <h2>Transcription engine</h2>
      <div class="row">
        <label>Inference threads
          <span class="hint">CPU threads for whisper (1-4). Higher is faster but competes with video. Restart to apply fully.</span>
        </label>
        <input type="number" id="InferenceThreads" min="1" max="4" step="1">
      </div>
      <div class="row">
        <label>Language
          <span class="hint">Whisper language code (e.g. en, de, fr) or auto. Only effective with a multilingual model.</span>
        </label>
        <input type="text" id="Language" autocomplete="off">
      </div>
      <div class="row">
        <label>Translate to English
          <span class="hint">Translate speech to English (multilingual models only).</span>
        </label>
        <select id="Translate">
          <option value="no">Off</option>
          <option value="yes">On</option>
        </select>
      </div>
      <div class="row">
        <label>Max tokens
          <span class="hint">Upper bound on decoded tokens per phrase (16-224).</span>
        </label>
        <input type="number" id="MaxTokens" min="16" max="224" step="1">
      </div>
      <div class="row">
        <label>Temperature fallback
          <span class="hint">Re-decode hard audio for accuracy. Can cause stalls on noisy scenes; leave off for busy installs.</span>
        </label>
        <select id="TemperatureFallback">
          <option value="no">Off</option>
          <option value="yes">On</option>
        </select>
      </div>
      <div class="row">
        <label>Custom model URL
          <span class="hint">Direct link to a whisper.cpp ggml .bin model. Downloaded once to the device. Restart to load. Leave empty for the bundled model.</span>
        </label>
        <input type="text" id="ModelUrl" placeholder="https://.../ggml-base.en-q5_1.bin" autocomplete="off">
      </div>
    </div>

    <div class="card">
      <h2>Advanced speech tuning</h2>
      <div class="row">
        <label>Noise guard margin
          <span class="hint">How far speech must rise above room noise to be transcribed (0.5-40). Higher = fewer false triggers.</span>
        </label>
        <input type="number" id="NoiseGuardMargin" min="0.5" max="40" step="0.5">
      </div>
      <div class="row">
        <label>Minimum signal peak
          <span class="hint">Absolute level below which audio is treated as noise (0-0.5).</span>
        </label>
        <input type="number" id="MinSignalPeak" min="0" max="0.5" step="0.01">
      </div>
      <div class="row">
        <label>Max gain
          <span class="hint">Cap on how much quiet speech is amplified (1-10).</span>
        </label>
        <input type="number" id="MaxGain" min="1" max="10" step="0.5">
      </div>
      <div class="row">
        <label>Streaming step (ms)
          <span class="hint">How often live captions refresh while speaking (300-3000). Lower = more responsive, more CPU.</span>
        </label>
        <input type="number" id="StreamStepMs" min="300" max="3000" step="100">
      </div>
    </div>

    <div class="card">
      <h2>Integrations</h2>
      <div class="row">
        <label>HTTP API
          <span class="hint">Expose transcriptions at <code>/local/Whisper_Subtitles/api/latest</code>, <code>/history</code> and <code>/stream</code> (live SSE), using the device login. Restart to apply.</span>
        </label>
        <select id="ApiEnabled">
          <option value="yes">Enabled</option>
          <option value="no">Disabled</option>
        </select>
      </div>
      <div class="row">
        <label>Publish to MQTT
          <span class="hint">Send each transcription to an MQTT broker. Restart to apply.</span>
        </label>
        <select id="MqttEnabled">
          <option value="no">Disabled</option>
          <option value="yes">Enabled</option>
        </select>
      </div>
      <div class="row">
        <label>Broker host</label>
        <input type="text" id="MqttHost" placeholder="e.g. 192.168.0.10" autocomplete="off">
      </div>
      <div class="row">
        <label>Broker port</label>
        <input type="number" id="MqttPort" min="1" max="65535" step="1">
      </div>
      <div class="row">
        <label>Use TLS</label>
        <select id="MqttTls">
          <option value="no">Off</option>
          <option value="yes">On</option>
        </select>
      </div>
      <div class="row">
        <label>Verify TLS certificate
          <span class="hint">Require a valid broker certificate. Leave off for self-signed brokers on a trusted network.</span>
        </label>
        <select id="MqttTlsVerify">
          <option value="no">Off</option>
          <option value="yes">On</option>
        </select>
      </div>
      <div class="row">
        <label>Username</label>
        <input type="text" id="MqttUser" autocomplete="off">
      </div>
      <div class="row">
        <label>Password</label>
        <input type="password" id="MqttPass" autocomplete="new-password">
      </div>
      <div class="row">
        <label>Topic</label>
        <input type="text" id="MqttTopic" placeholder="whisper/subtitles" autocomplete="off">
      </div>
      <div class="row">
        <label>Client ID
          <span class="hint">Optional. Leave empty for a default.</span>
        </label>
        <input type="text" id="MqttClientId" autocomplete="off">
      </div>
      <div class="row">
        <label>Publish partials
          <span class="hint">Also publish live partial captions, not just finalized phrases.</span>
        </label>
        <select id="MqttPublishPartials">
          <option value="no">Off</option>
          <option value="yes">On</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button type="submit" id="saveBtn">Save</button>
      <button type="button" id="saveRestartBtn">Save &amp; restart app</button>
      <button type="button" class="secondary" id="reloadBtn">Reload</button>
      <span id="status"></span>
    </div>
  </form>

<script>
(function () {
  "use strict";
  var GROUP = "Whisper_Subtitles";
  var FIELDS = [
    "MicSensitivity", "SilenceTimeoutMs", "MinSpeechMs", "MaxUtteranceSec",
    "SubtitleDurationSec", "FontScale", "SubtitlePosition", "StreamingCaptions",
    "SubtitlesEnabled", "MaxLines", "BarHeightPct", "BackgroundOpacity",
    "TextColor", "InferenceThreads", "Language", "Translate", "MaxTokens",
    "TemperatureFallback", "ModelUrl", "NoiseGuardMargin", "MinSignalPeak",
    "MaxGain", "StreamStepMs", "ApiEnabled", "MqttEnabled", "MqttHost",
    "MqttPort", "MqttTls", "MqttTlsVerify", "MqttUser", "MqttPass", "MqttTopic",
    "MqttClientId", "MqttPublishPartials",
    "RemoteAudioHost", "RemoteAudioUser", "RemoteAudioPass"
  ];

  var statusEl = document.getElementById("status");
  var saveBtn = document.getElementById("saveBtn");
  var saveRestartBtn = document.getElementById("saveRestartBtn");

  function setStatus(msg, kind) {
    statusEl.textContent = msg;
    statusEl.className = kind || "";
  }

  function param(action, query) {
    // Settings are served by the app itself (admin reverseProxy route), so the
    // page works on devices that do not serve VAPIX param.cgi (e.g. the S3008).
    var url = "config/settings?action=" + action + (query ? "&" + query : "");
    return fetch(url, { credentials: "same-origin", cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      });
  }

  function load() {
    setStatus("Loading...");
    return param("list").then(function (text) {
      var map = {};
      try { map = JSON.parse(text); } catch (e) { map = {}; }
      FIELDS.forEach(function (name) {
        var el = document.getElementById(name);
        if (el && map.hasOwnProperty(name) && map[name] !== "") el.value = map[name];
      });
      setStatus("");
    }).catch(function (e) {
      setStatus("Could not load settings: " + e.message, "err");
    });
  }

  function setBusy(b) {
    saveBtn.disabled = b;
    saveRestartBtn.disabled = b;
  }

  function restartApp() {
    setStatus("Saved. Restarting app...");
    return fetch(
      "/axis-cgi/applications/control.cgi?package=" + GROUP + "&action=restart",
      { credentials: "same-origin", cache: "no-store" }
    ).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    }).then(function (text) {
      if (/OK/i.test(text)) {
        setStatus("Saved and app restarted.", "ok");
      } else {
        setStatus("Saved, but restart failed: " + text.trim(), "err");
      }
    });
  }

  function save(restart) {
    var parts = [];
    FIELDS.forEach(function (name) {
      var el = document.getElementById(name);
      if (el) parts.push(name + "=" + encodeURIComponent(el.value));
    });
    setStatus("Saving...");
    setBusy(true);
    param("update", parts.join("&")).then(function (text) {
      if (!/OK/i.test(text)) {
        setStatus("Device response: " + text.trim(), "err");
        return;
      }
      if (restart) return restartApp();
      setStatus("Saved. Live changes applied. Model, API and MQTT changes need an app restart.", "ok");
    }).catch(function (e) {
      setStatus((restart ? "Save/restart failed: " : "Save failed: ") + e.message, "err");
    }).then(function () {
      setBusy(false);
    });
  }

  document.getElementById("form").addEventListener("submit", function (e) {
    e.preventDefault();
    save(false);
  });
  document.getElementById("saveRestartBtn").addEventListener("click", function () {
    save(true);
  });
  document.getElementById("reloadBtn").addEventListener("click", load);

  load();
})();
</script>
</body>
</html>
